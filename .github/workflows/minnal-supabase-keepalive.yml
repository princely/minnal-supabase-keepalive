name: Supabase Keep Alive

on:
  schedule:
    # Runs every 3 days at 08:00 UTC
    - cron: "0 8 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase healthcheck table
        run: |
          curl -f -sS \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/rest/v1/healthcheck?id=eq.1&select=id,checked_at"
